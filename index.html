<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potion Recipe Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Potion Recipe Game 🧪</h1>
    <p>Create a healing potion! You need: <b>2 Herbs, 1 Berry, 1 Mushroom</b></p>

    <div class="container">
        <button onclick="addIngredient('herbs')">Add Herbs</button>
        <button onclick="addIngredient('berries')">Add Berries</button>
        <button onclick="addIngredient('mushrooms')">Add Mushrooms</button>
        <button onclick="addIngredient('water')">Add Water</button>
        <button onclick="addIngredient('flowers')">Add Flowers</button>

        <br><br>

        <button class="brew-btn" onclick="checkPotion()">Brew Potion</button>

        <p id="status">Start brewing! 🧙‍♀️</p>

        <div class="inventory">
            <p><b>Cauldron:</b></p>
            <p>Herbs: <span id="herbs">0</span></p>
            <p>Berries: <span id="berries">0</span></p>
            <p>Mushrooms: <span id="mushrooms">0</span></p>
            <p>Water: <span id="water">0</span></p>
            <p>Flowers: <span id="flowers">0</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
