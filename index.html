<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potion Recipe Game</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #1e1e2f, #2e2e4d);
            color: white;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #a8ff60;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            max-width: 400px;
            margin: 0 auto;
        }

        button {
            margin: 5px;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #4caf50;
            color: white;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        .brew-btn {
            background-color: #ff9800;
        }

        .brew-btn:hover {
            background-color: #e68900;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
        }

        .inventory {
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>

<body>
    <h1>Potion Recipe Game 🧪</h1>
    <p>Create a healing potion! You need: <b>2 Herbs, 1 Berry, 1 Mushroom</b></p>

    <div class="container">
        <button onclick="addIngredient('herbs')">Add Herbs</button>
        <button onclick="addIngredient('berries')">Add Berries</button>
        <button onclick="addIngredient('mushrooms')">Add Mushrooms</button>
        <button onclick="addIngredient('water')">Add Water</button>
        <button onclick="addIngredient('flowers')">Add Flowers</button>

        <br><br>

        <button class="brew-btn" onclick="checkPotion()">Brew Potion</button>

        <p id="status">Start brewing! 🧙‍♀️</p>

        <div class="inventory">
            <p><b>Cauldron:</b></p>
            <p>Herbs: <span id="herbs">0</span></p>
            <p>Berries: <span id="berries">0</span></p>
            <p>Mushrooms: <span id="mushrooms">0</span></p>
            <p>Water: <span id="water">0</span></p>
            <p>Flowers: <span id="flowers">0</span></p>
        </div>
    </div>

    <script>
        const cauldron = {
            herbs: 0,
            berries: 0,
            mushrooms: 0,
            water: 0,
            flowers: 0
        };

        function addIngredient(type) {
            cauldron[type]++;
            console.log(`La til 1 ${type} i gryta.`);
            updateUI();
            updateStatus(`La til ${type}!`);
        }

        function updateUI() {
            document.getElementById("herbs").textContent = cauldron.herbs;
            document.getElementById("berries").textContent = cauldron.berries;
            document.getElementById("mushrooms").textContent = cauldron.mushrooms;
            document.getElementById("water").textContent = cauldron.water;
            document.getElementById("flowers").textContent = cauldron.flowers;
        }

        function printCauldron() {
            console.log("\nGryta inneholder:");
            console.log(`Herbs: ${cauldron.herbs}`);
            console.log(`Berries: ${cauldron.berries}`);
            console.log(`Mushrooms: ${cauldron.mushrooms}`);
            console.log(`Water: ${cauldron.water}`);
            console.log(`Flowers: ${cauldron.flowers}`);
        }

        function checkPotion() {
            printCauldron();

            const correct =
                cauldron.herbs === 2 &&
                cauldron.berries === 1 &&
                cauldron.mushrooms === 1 &&
                cauldron.water === 0 &&
                cauldron.flowers === 0;

            if (correct) {
                console.log("\nGratulerer! Du har brygget en perfekt healing potion!");
                updateStatus("✅ Perfekt potion!");
            } else {
                console.log("\nÆsj! Dette ble ikke en healing potion. Prøv igjen.");
                updateStatus("❌ Feil oppskrift!");
            }
        }

        function updateStatus(message) {
            document.getElementById("status").textContent = message;
        }
    </script>
</body>
</html>
