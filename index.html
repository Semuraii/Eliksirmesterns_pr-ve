<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potion Recipe Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Eliksir mester 🧪</h1>
    <p>Lag en perfekt healing potion! 🧙‍♀️</p>

    <div class="container">
        <button onclick="addIngredient('herbs')">🌿 Legg til Herbs</button>
        <button onclick="addIngredient('berries')">🍓 Legg til Berries</button>
        <button onclick="addIngredient('mushrooms')">🍄 Legg til Mushrooms</button>
        <button onclick="addIngredient('water')">💧 Legg til Water</button>
        <button onclick="addIngredient('flowers')">🌸 Legg til Flowers</button>

        <br><br>

        <button class="reset-btn" onclick="resetCauldron()">🔄 Reset</button>
        <button class="brew-btn" onclick="checkPotion()">🧪 Brew Potion</button>
        <button class="cheat-btn" onclick="showRecipe()">🕵️ Cheat</button>

        <p id="status">Start brewing! 🧙‍♀️</p>

        <div class="inventory">
            <p><b>🧪 Cauldron:</b></p>
            <p>🌿 Herbs: <span id="herbs">0</span></p>
            <p>🍓 Berries: <span id="berries">0</span></p>
            <p>🍄 Mushrooms: <span id="mushrooms">0</span></p>
            <p>💧 Water: <span id="water">0</span></p>
            <p>🌸 Flowers: <span id="flowers">0</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
